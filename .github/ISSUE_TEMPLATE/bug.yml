name: Bug report
description: Something broke. Help us reproduce it.
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The more
        context you give, the faster we can confirm and fix it.

        **For security issues, do not open a public issue.**
        See [SECURITY.md](https://github.com/limeflash/antigravity-plugin-cc/blob/main/SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what did you get instead?
      placeholder: |
        Ran `/agy:rescue --background investigate flaky test`, expected a
        task-id, got an empty response.
    validations:
      required: true

  - type: textarea
    id: setup-output
    attributes:
      label: Output of `/agy:setup`
      description: Paste verbatim. This tells us which `agy` you're on.
      render: shell
    validations:
      required: true

  - type: input
    id: agy-version
    attributes:
      label: "`agy --version`"
      placeholder: "agy 1.0.x"
    validations:
      required: true

  - type: input
    id: bash-version
    attributes:
      label: "`bash --version` (first line)"
      placeholder: "GNU bash, version 5.2.x..."
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - WSL (on Windows)
        - Windows (native PowerShell — not yet supported)
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Anything from `~/.gemini/antigravity-cli/log/`, the wrapper's
        stderr, or Claude Code's command output.
      render: shell

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmations
      options:
        - label: I've checked existing issues for duplicates.
          required: true
        - label: I'm on the latest commit of `main` (or I've noted the version).
          required: true
