version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"

  # Node deps are added in Phase 2 (job-control companion). The
  # ecosystem entry below is harmless until package.json appears.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore"
      include: "scope"
    versioning-strategy: "increase"
    ignore:
      # vitest and bats-core have rapid major bumps; pin to minor.
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
